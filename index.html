<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xec V2 | Luau Obfuscator</title>
    <style>
        :root { 
            --bg: #0b0b0b; 
            --accent: #00ffaa; 
            --border: #222; 
            --text: #888; 
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body { 
            background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden; 
        }

        /* --- 开屏动画 --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9998; transition: opacity 1s ease;
        }

        #intro-container {
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; transition: all 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #logo-icon { width: 220px; transition: all 1.2s cubic-bezier(0.85, 0, 0.15, 1); }

        #intro-text {
            font-size: 32px; font-weight: bold; letter-spacing: 4px; color: #fff; 
            text-transform: uppercase; white-space: nowrap;
            opacity: 0; width: 0; overflow: hidden;
            transition: all 0.8s ease-out;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .show-text #intro-text { opacity: 1; width: 480px; margin-left: 35px; }

        .move-to-corner { top: 30px !important; left: 30px !important; transform: translate(0, 0) !important; }
        .move-to-corner #logo-icon { width: 35px !important; }
        .move-to-corner #intro-text { opacity: 0 !important; width: 0 !important; margin-left: 0 !important; }

        /* --- 主界面容器 --- */
        .container { 
            width: 900px; padding: 40px; margin-top: 80px;
            opacity: 0; transition: opacity 1.5s ease;
            overflow-y: auto; max-height: 90vh;
            scrollbar-width: none; 
        }
        .container::-webkit-scrollbar { display: none; }

        .show-ui { opacity: 1 !important; }

        .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .header h1 { font-size: 18px; letter-spacing: 2px; margin: 0; color: #fff; text-transform: uppercase; } 

        .section { margin-bottom: 25px; }
        .label { font-size: 9px; color: var(--text); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        
        textarea, input[type="text"] { 
            width: 100%; background: #050505; color: var(--accent); border: 1px solid var(--border); 
            padding: 15px; box-sizing: border-box; border-radius: 4px; 
            font-family: 'Consolas', monospace; font-size: 12px; outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus, textarea:focus { border-color: #444; }

        .controls { display: flex; gap: 10px; margin: 15px 0; }
        button { 
            background: transparent; border: 1px solid var(--border); color: #fff; 
            padding: 10px 25px; font-size: 11px; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 1px; transition: 0.2s;
        }
        button:hover { background: #fff; color: #000; border-color: #fff; }
        .btn-obf { border-color: var(--accent); color: var(--accent); }
        .btn-obf:hover { background: var(--accent); color: #000; }

        /* Loadstring 卡片 - 现在移到下方 */
        .loadstring-box {
            background: rgba(255,255,255,0.02);
            border: 1px dashed #333;
            padding: 20px;
            border-radius: 8px;
            margin-top: 40px; /* 增加与上方 Output 的间距 */
        }

        .footer { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 30px; border-top: 1px solid var(--border); padding-top: 15px;
            font-size: 10px; color: var(--text);
        }
        .contact-link { color: var(--accent); text-decoration: none; font-weight: bold; padding: 4px 10px; border: 1px solid var(--accent); border-radius: 4px; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="splash"></div>
    <div id="intro-container">
        <img src="logo.png" id="logo-icon">
        <div id="intro-text">Xec V2 Obfuscator</div>
    </div>

    <div class="container" id="main-ui">
        <div class="header">
            <h1>XEC V2 | LUAU SOURCE PROTECTION</h1>
            <span>BUILD: 0.25.2a</span>
        </div>

        <div class="section">
            <div class="label">Header / ASCII</div>
            <textarea id="ascii" style="height: 60px;" placeholder="-- Custom header..."></textarea>
        </div>

        <div class="section">
            <div class="label">Source Code (Luau)</div>
            <textarea id="source" style="height: 180px;" placeholder="print('Hello World')"></textarea>
        </div>

        <div class="controls">
            <button class="btn-obf" onclick="build()">Obfuscate Source</button>
            <button onclick="copy()">Copy Output</button>
            <button onclick="clearAll()">Clear</button>
        </div>

        <div class="section">
            <div class="label">Output</div>
            <textarea id="output" style="height: 180px;" readonly placeholder="-- Result will appear here..."></textarea>
        </div>

        <div class="loadstring-box">
            <div class="label" style="color: #fff;">Lazy Loadstring Obfuscator</div>
            <p style="font-size: 10px; color: #555; margin-bottom: 10px;">Quickly wrap and obfuscate a Raw Script URL:</p>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="raw-url" placeholder="Paste Raw URL (Github/Pastebin)...">
                <button class="btn-obf" onclick="quickObfLoadstring()" style="white-space: nowrap;">Obfuscate URL</button>
            </div>
        </div>

        <div class="footer">
            <div>&copy; XEC V2 PROJECT</div>
            <div>Support: <a href="https://discord.com" target="_blank" class="contact-link">@L_EpicGuy</a></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const container = document.getElementById('intro-container');
            const splash = document.getElementById('splash');
            const ui = document.getElementById('main-ui');

            if(localStorage.getItem('xec_ascii')) {
                document.getElementById('ascii').value = localStorage.getItem('xec_ascii');
            }

            setTimeout(() => { container.classList.add('show-text'); }, 600);

            setTimeout(() => {
                container.classList.add('move-to-corner');
                splash.style.opacity = "0";
                ui.classList.add('show-ui');
                document.body.style.overflowY = "auto";
                setTimeout(() => { splash.style.display = "none"; }, 1000);
            }, 3000);
        };

        function xec_obfuscate(input) {
            const ascii = document.getElementById('ascii').value;
            const inv = "\u2004"; 
            let head = "";
            if(ascii) {
                ascii.split('\n').forEach(l => { head += "-- " + l.replace(/ /g, inv) + "\n"; });
                head += "--\n";
            }
            
            const salt = Math.floor(Math.random() * 50) + 100;
            const bytes = new TextEncoder().encode(input);
            let hex = "";
            for (let b of bytes) { hex += (b ^ salt).toString(16).padStart(2, '0'); }

            const chunks = hex.match(/.{1,100}/g);
            let res = head + `--[[ Obfuscated by Xec v2 ]]\nlocal _v = ""\n`;
            chunks.forEach(c => { res += `_v = _v .. "${c}"\n`; });
            res += `\nlocal _k = ${salt}\nlocal _b = {}\nfor i=1,#_v,2 do table.insert(_b,string.char(bit32.bxor(tonumber(_v:sub(i,i+1),16),_k))) end\nloadstring(table.concat(_b))()`;
            return res;
        }

        function quickObfLoadstring() {
            const url = document.getElementById('raw-url').value.trim();
            if(!url) return;
            const loadstring_code = `loadstring(game:HttpGet("${url}"))()`;
            document.getElementById('output').value = xec_obfuscate(loadstring_code);
            // 滚动到 Output 看到结果
            document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
        }

        function build() {
            const src = document.getElementById('source').value;
            if(!src) return;
            localStorage.setItem('xec_ascii', document.getElementById('ascii').value);
            document.getElementById('output').value = xec_obfuscate(src);
        }

        function copy() {
            const el = document.getElementById('output');
            el.select();
            document.execCommand('copy');
        }

        function clearAll() {
            document.getElementById('source').value = "";
            document.getElementById('output').value = "";
            document.getElementById('raw-url').value = "";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XEC V2 | #1 LUAU OBFUSCATOR</title>
    <style>
        :root { 
            --bg: #050505; 
            --accent: #00ffaa; 
            --border: #222; 
            --text: #888; 
            --input-bg: #000;
        }

        body { 
            background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center;
        }

        .wrapper { width: 900px; }

        .header-title { font-size: 18px; font-weight: bold; letter-spacing: 2px; color: #fff; margin-bottom: 30px; }

        .section { margin-bottom: 25px; width: 100%; }
        .label { font-size: 9px; color: var(--text); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

        textarea, input[type="text"] { 
            width: 100%; background: var(--input-bg); color: var(--accent); border: 1px solid var(--border); 
            padding: 15px; box-sizing: border-box; border-radius: 2px; 
            font-family: 'Consolas', monospace; font-size: 12px; outline: none; transition: 0.2s;
        }
        
        textarea:focus, input:focus { border-color: #444; }

        .btn-row { display: flex; gap: 10px; margin: 20px 0 30px 0; }
        
        button { 
            background: transparent; border: 1px solid var(--border); color: #fff; 
            padding: 10px 25px; font-size: 11px; cursor: pointer; text-transform: uppercase; 
            font-weight: bold; transition: 0.2s;
        }

        .btn-primary { border-color: var(--accent); color: var(--accent); }
        button:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Loadstring Maker - The Dotted Box from Image #5 */
        .ls-container { 
            border: 1px dashed #333; padding: 25px; border-radius: 4px; margin-top: 20px;
        }
        .ls-input-group { display: flex; gap: 10px; margin-top: 10px; }
        
        #ls-url { background: #080808; flex: 1; }

        ::placeholder { color: #333; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-title">XEC V2 | #1 LUAU OBFUSCATOR</div>

        <div class="section">
            <div class="label">Header</div>
            <textarea id="ascii" style="height: 65px;" placeholder="test" spellcheck="false"></textarea>
        </div>

        <div class="section">
            <div class="label">Source Code (Luau)</div>
            <textarea id="source" style="height: 200px;" placeholder='print("wow")' spellcheck="false"></textarea>
        </div>

        <div class="btn-row">
            <button class="btn-primary" onclick="build()">Obfuscate</button>
            <button onclick="copy()">Copy</button>
            <button onclick="clearAll()">Clear</button>
        </div>

        <div class="section">
            <div class="label">Output</div>
            <textarea id="output" style="height: 200px;" readonly placeholder="-- Hello" spellcheck="false"></textarea>
        </div>

        <div class="section ls-container">
            <div class="label" style="margin-bottom: 5px;">Loadstring Maker</div>
            <div style="font-size: 10px; color: #444; margin-bottom: 15px;">Paste a Raw URL:</div>
            <div class="ls-input-group">
                <input type="text" id="ls-url" placeholder="hi again" spellcheck="false">
                <button class="btn-primary" onclick="makeLS()">Generate</button>
            </div>
        </div>
    </div>

    <script>
        function xec_obfuscate(input) {
            const keys = [105, 72, 130]; // Fixed set for cleaner output
            const bytes = new TextEncoder().encode(input);
            let hex = "";
            for (let i = 0; i < bytes.length; i++) { 
                hex += (bytes[i] ^ keys[i % 3]).toString(16).padStart(2, '0'); 
            }
            return `--[[ Obfuscated by Xec V2 ]]\nlocal _v="${hex}";local _k={105,72,130};local _b={};for i=1,#_v,2 do table.insert(_b,string.char(bit32.bxor(tonumber(_v:sub(i,i+1),16),_k[(math.ceil(i/2)-1)%#_k+1]))) end;loadstring(table.concat(_b))()`;
        }

        function build() {
            const src = document.getElementById('source').value;
            if(!src) return;
            document.getElementById('output').value = xec_obfuscate(src);
        }

        function makeLS() {
            const url = document.getElementById('ls-url').value;
            if(!url) return;
            // Includes the requested 'true' for local cache saving
            document.getElementById('output').value = `loadstring(game:HttpGet("${url}", true))()`;
        }

        function copy() {
            const out = document.getElementById('output');
            out.select();
            document.execCommand('copy');
        }

        function clearAll() {
            document.getElementById('source').value = "";
            document.getElementById('output').value = "";
            document.getElementById('ls-url').value = "";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xec V2 | Luau Obfuscator</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root { 
            --bg: #0b0b0b; 
            --accent: #00ffaa; 
            --border: #222; 
            --text: #888; 
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body { 
            background: var(--bg); color: #eee; font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden; 
        }

        /* --- INTRO / SPLASH LAYER --- */
        #splash {
            position: fixed; inset: 0;
            background: #000; z-index: 9998; transition: opacity 1.2s ease;
        }

        #intro-container {
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
        }

        /* The Animated Logo Parts */
        .logo-part {
            position: fixed; width: 300px; height: 300px;
            top: calc(50% - 150px); left: calc(50% - 150px);
            background: url('logo.png') no-repeat center;
            background-size: contain;
            transition: all 1.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: scale(0) rotate(-220deg);
            opacity: 0;
        }

        /* Precision 135° Sharp Bevel Cut (4% / 96%) */
        .top-half { clip-path: polygon(0 0, 100% 0, 100% 96%, 0 4%); }
        .bottom-half { clip-path: polygon(0 4%, 100% 96%, 100% 100%, 0 100%); }

        /* Animation States */
        .ready { transform: scale(1) rotate(0deg) !important; opacity: 1 !important; }
        
        .exit-top { transform: translate(160vw, -160vh) scale(0.3) rotate(90deg) !important; transition: all 2.2s cubic-bezier(0.5, 0, 0.5, 1) !important; }
        .exit-bottom { transform: translate(-160vw, 160vh) scale(0.3) rotate(-90deg) !important; transition: all 2.2s cubic-bezier(0.5, 0, 0.5, 1) !important; }

        .arrive { 
            top: 30px !important; left: 30px !important; 
            width: 45px !important; height: 45px !important; 
            transform: translate(0, 0) scale(1) rotate(0deg) !important; 
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.1) !important;
        }

        /* --- MAIN UI --- */
        .container { 
            width: 900px; padding: 40px; margin-top: 80px;
            opacity: 0; transition: opacity 1.5s ease;
            overflow-y: auto; max-height: 90vh;
        }
        .container::-webkit-scrollbar { display: none; }
        .show-ui { opacity: 1 !important; }

        .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .header h1 { font-size: 18px; letter-spacing: 5px; margin: 0; color: #fff; text-transform: uppercase; margin-left: 60px; } 

        .section { margin-bottom: 25px; }
        .label { font-size: 9px; color: var(--text); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        
        textarea, input[type="text"] { 
            width: 100%; background: #050505; color: var(--accent); border: 1px solid var(--border); 
            padding: 15px; box-sizing: border-box; border-radius: 4px; 
            font-family: 'Consolas', monospace; font-size: 12px; outline: none;
            transition: 0.3s;
        }

        .controls { display: flex; gap: 10px; margin: 15px 0; }
        button { 
            background: transparent; border: 1px solid var(--border); color: #fff; 
            padding: 10px 25px; font-size: 11px; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 1px; transition: 0.2s;
        }
        button:hover { background: #fff; color: #000; }
        .btn-main { border-color: var(--accent); color: var(--accent); }
        .btn-main:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(0, 255, 170, 0.2); }

        .loadstring-box {
            background: rgba(255,255,255,0.02);
            border: 1px dashed #333;
            padding: 20px; border-radius: 8px; margin-top: 40px;
        }

        .footer { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 30px; border-top: 1px solid var(--border); padding-top: 15px;
            font-size: 10px; color: var(--text); padding-bottom: 40px;
        }
    </style>
</head>
<body>

    <div id="splash"></div>
    
    <div class="logo-part top-half" id="p1"></div>
    <div class="logo-part bottom-half" id="p2"></div>

    <div class="container" id="main-ui">
        <div class="header">
            <h1>XEC V2 // LUAU OBFUSCATOR</h1>
            <span style="color: #444; font-size: 10px;">PRIVATE BUILD</span>
        </div>

        <div class="section">
            <div class="label">Custom Header</div>
            <textarea id="ascii" style="height: 60px;" placeholder="-- Custom ASCII / Credits here"></textarea>
        </div>

        <div class="section">
            <div class="label">Source Code</div>
            <textarea id="source" style="height: 180px;" placeholder="Paste your script..."></textarea>
        </div>

        <div class="controls">
            <button class="btn-main" onclick="build()">Obfuscate</button>
            <button onclick="copy()">Copy Output</button>
            <button onclick="clearAll()">Clear</button>
        </div>

        <div class="section">
            <div class="label">Protected Output</div>
            <textarea id="output" style="height: 180px;" readonly placeholder="-- Encrypted code will appear here"></textarea>
        </div>

        <div class="loadstring-box">
            <div class="label" style="color: #fff;">Loadstring Generator</div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="raw-url" placeholder="Paste GitHub Raw URL...">
                <button class="btn-main" onclick="quickObfLoadstring()" style="white-space: nowrap;">Generate</button>
            </div>
        </div>

        <div class="footer">
            <div>&copy; XEC V2 PROJECT</div>
            <div>Support: <span style="color: var(--accent)">@L_EpicGuy</span></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const p1 = document.getElementById('p1');
            const p2 = document.getElementById('p2');
            const splash = document.getElementById('splash');
            const ui = document.getElementById('main-ui');

            // 1. Slow Power-up Spin
            setTimeout(() => { 
                p1.classList.add('ready'); 
                p2.classList.add('ready'); 
            }, 500);

            // 2. Slow-Mo Split & Exit
            setTimeout(() => {
                p1.classList.add('exit-top');
                p2.classList.add('exit-bottom');
            }, 3000);

            // 3. Glide Return to Corner
            setTimeout(() => {
                splash.style.opacity = "0";
                ui.classList.add('show-ui');

                p1.style.transition = "none";
                p2.style.transition = "none";
                p1.style.transform = "translate(-300px, -300px)";
                p2.style.transform = "translate(-300px, -300px)";
                
                setTimeout(() => {
                    p1.classList.add('arrive');
                    p2.classList.add('arrive');
                }, 100);
            }, 4800);

            setTimeout(() => { splash.style.display = "none"; }, 6500);

            if(localStorage.getItem('xec_ascii')) {
                document.getElementById('ascii').value = localStorage.getItem('xec_ascii');
            }
        };

        function xec_obfuscate(input) {
            const ascii = document.getElementById('ascii').value;
            let head = "";
            if(ascii) {
                ascii.split('\n').forEach(l => { head += "-- " + l + "\n"; });
                head += "--\n";
            }
            
            // Hardened Rolling Key Stream
            const keys = [
                Math.floor(Math.random() * 50) + 100,
                Math.floor(Math.random() * 50) + 50,
                Math.floor(Math.random() * 50) + 150
            ];
            
            const bytes = new TextEncoder().encode(input);
            let hex = "";
            
            for (let i = 0; i < bytes.length; i++) {
                const salt = keys[i % keys.length];
                hex += (bytes[i] ^ salt).toString(16).padStart(2, '0');
            }

            const chunks = hex.match(/.{1,100}/g);
            let res = head + `--[[ Protected by Xec V2 ]]\nlocal _v = ""\n`;
            chunks.forEach(c => { res += `_v = _v .. "${c}"\n`; });
            
            res += `\nlocal _k = {${keys.join(',')}}\n`;
            res += `local _b = {}\nfor i=1,#_v,2 do\n  local _idx = (math.ceil(i/2)-1) % #_k + 1\n`;
            res += `  table.insert(_b, string.char(bit32.bxor(tonumber(_v:sub(i,i+1),16), _k[_idx])))\nend\n`;
            res += `loadstring(table.concat(_b))()`;
            
            return res;
        }

        function build() {
            const src = document.getElementById('source').value;
            if(!src) return;
            localStorage.setItem('xec_ascii', document.getElementById('ascii').value);
            document.getElementById('output').value = xec_obfuscate(src);
        }

        function quickObfLoadstring() {
            const url = document.getElementById('raw-url').value.trim();
            if(!url) return;
            document.getElementById('output').value = xec_obfuscate(`loadstring(game:HttpGet("${url}"))()`);
        }

        function copy() {
            const el = document.getElementById('output');
            el.select();
            document.execCommand('copy');
        }

        function clearAll() {
            document.getElementById('source').value = "";
            document.getElementById('output').value = "";
        }
    </script>
</body>
</html>

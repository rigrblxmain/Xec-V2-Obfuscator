<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xec v2 Obfuscator</title>
    <style>
        :root { 
            --bg: #0b0b0b; 
            --nav-bg: #090311; 
            --accent: #00ffaa; 
            --border: #222; 
            --text: #888; 
            --nav-text: #a1a1aa;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body { 
            background: var(--bg); color: #eee; font-family: 'Inter', 'Segoe UI', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow: hidden; 
        }

        /* --- INTRO TEXT & LOGO --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9998; transition: opacity 1s ease;
        }

        #intro-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; align-items: center; z-index: 10000; gap: 20px;
        }

        #logo-icon {
            width: 250px;
            transition: all 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #intro-text {
            font-size: 28px; font-weight: bold; letter-spacing: 6px; color: var(--accent);
            text-transform: uppercase; white-space: nowrap;
            opacity: 0; transform: translateX(-30px); /* Start hidden/left */
            transition: all 0.8s ease-out;
            text-shadow: 0 0 15px rgba(0, 255, 170, 0.4);
        }

        /* Animation States */
        .text-slide-in { opacity: 1 !important; transform: translateX(0) !important; }
        .text-fade-out { opacity: 0 !important; }

        .icon-at-corner {
            position: fixed !important; top: 25px !important; left: 25px !important;
            transform: translate(0, 0) !important; width: 35px !important;
        }

        /* --- TOP NAV --- */
        .top-nav {
            width: 100%; height: 60px; background: var(--nav-bg);
            display: flex; justify-content: center; align-items: center; gap: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed; top: 0; z-index: 1000; opacity: 0; transition: opacity 1s ease;
        }

        .nav-link { color: var(--nav-text); text-decoration: none; font-size: 14px; transition: 0.3s; }
        .nav-link:hover { color: #fff; }

        /* --- UI CONTAINER --- */
        .container { 
            width: 900px; padding: 40px; margin-top: 80px;
            opacity: 0; transition: opacity 1.5s ease;
        }
        .show-ui { opacity: 1 !important; }

        .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .header h1 { font-size: 18px; letter-spacing: 4px; margin: 0; color: #fff; } 
        
        textarea { 
            width: 100%; background: #050505; color: var(--accent); border: 1px solid var(--border); 
            padding: 15px; box-sizing: border-box; border-radius: 4px; resize: none; 
            font-family: 'Fira Code', 'Consolas', monospace; font-size: 11px; outline: none;
        }

        .controls { display: flex; gap: 10px; margin: 20px 0; }
        button { 
            background: transparent; border: 1px solid var(--border); color: #fff; 
            padding: 10px 25px; font-size: 11px; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        button:hover { background: #fff; color: #000; }
        .btn-obf { border-color: var(--accent); color: var(--accent); }
        .btn-obf:hover { background: var(--accent); color: #000; }

        .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 15px; font-size: 10px; color: var(--text); }
        .contact-link { color: var(--accent); text-decoration: none; font-weight: bold; padding: 4px 10px; border: 1px solid var(--accent); border-radius: 4px; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="splash"></div>
    
    <div id="intro-container">
        <img src="logo.png" id="logo-icon">
        <div id="intro-text">X e c &nbsp; V 2 &nbsp; O b f u s c a t o r</div>
    </div>

    <nav class="top-nav" id="top-nav">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">Policy</a>
        <a href="#" class="nav-link">Plans</a>
        <a href="#" class="nav-link">Showcases</a>
        <a href="#" class="nav-link">FAQ</a>
        <a href="https://discord.com/users/718smiley.png" target="_blank" class="nav-link">Discord</a>
    </nav>

    <div class="container" id="main-ui">
        <div class="header">
            <h1>Xec V2 | Luau Obfuscator</h1>
            <span>0.25.2a</span>
        </div>

        <div class="section">
            <div class="label">Header / ASCII</div>
            <textarea id="ascii" style="height: 100px;"></textarea>
        </div>

        <div class="section">
            <div class="label">Source Code</div>
            <textarea id="source" style="height: 180px;"></textarea>
        </div>

        <div class="controls">
            <button class="btn-obf" onclick="build()">Obfuscate</button>
            <button onclick="copy()">Copy</button>
            <button onclick="clearAll()">Clear</button>
        </div>

        <div class="section">
            <div class="label">Output</div>
            <textarea id="output" style="height: 180px;" readonly></textarea>
        </div>

        <div class="footer">
            <div>&copy; XEC V2</div>
            <div>Support: <a href="https://discord.com/users/718smiley.png" target="_blank" class="contact-link">L_EpicGuy</a></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const icon = document.getElementById('logo-icon');
            const text = document.getElementById('intro-text');
            const splash = document.getElementById('splash');
            const ui = document.getElementById('main-ui');
            const nav = document.getElementById('top-nav');

            // 1. Slide Text in
            setTimeout(() => {
                text.classList.add('text-slide-in');
            }, 500);

            // 2. Start shrinking and fade text out
            setTimeout(() => {
                text.classList.add('text-fade-out');
                icon.classList.add('icon-at-corner');
                splash.style.opacity = "0";
                
                // Show UI
                ui.classList.add('show-ui');
                nav.style.opacity = "1";
                document.body.style.overflowY = "auto";
                
                setTimeout(() => { splash.style.display = "none"; }, 1000);
            }, 2500); // Wait 2.5s before moving
        };

        function build() {
            const src = document.getElementById('source').value;
            if(!src) return;
            const salt = Math.floor(Math.random() * 50) + 100;
            const bytes = new TextEncoder().encode(src);
            let hex = "";
            for (let b of bytes) { hex += (b ^ salt).toString(16).padStart(2, '0'); }
            const chunks = hex.match(/.{1,100}/g);
            let res = `--[[ Xec v2 ]]\nlocal _v = ""\n`;
            chunks.forEach(c => { res += `_v = _v .. "${c}"\n`; });
            res += `\nlocal _k = ${salt}\nlocal _b = {}\nfor i=1,#_v,2 do table.insert(_b,string.char(bit32.bxor(tonumber(_v:sub(i,i+1),16),_k))) end\nloadstring(table.concat(_b))()`;
            document.getElementById('output').value = res;
        }

        function copy() {
            const el = document.getElementById('output');
            el.select();
            document.execCommand('copy');
        }

        function clearAll() {
            document.getElementById('source').value = "";
            document.getElementById('output').value = "";
        }
    </script>
</body>
</html>

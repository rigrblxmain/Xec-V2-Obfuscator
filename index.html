<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XEC V2 | #1 LUAU OBFUSCATOR</title>
    <style>
        :root { 
            --bg: #050505; 
            --accent: #00ffaa; 
            --border: #222; 
            --text-dim: #888; 
            --input-bg: #000;
        }

        body { 
            background: var(--bg); color: #eee; font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* --- INTRO SPLASH --- */
        #splash { position: fixed; inset: 0; background: #000; z-index: 9998; transition: opacity 1s ease; }
        #intro-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center; z-index: 10000; 
            transition: all 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }
        #logo-wrapper { position: relative; width: 220px; height: 220px; transition: 1.2s; }
        .logo-part { position: absolute; inset: 0; background: url('logo.png') no-repeat center; background-size: contain; }
        .top-half { clip-path: polygon(0 0, 100% 0, 100% 96%, 0 4%); }
        .bottom-half { clip-path: polygon(0 4%, 100% 96%, 100% 100%, 0 100%); }
        #intro-text {
            font-size: 32px; font-weight: bold; letter-spacing: 4px; color: #fff; 
            text-transform: uppercase; white-space: nowrap; opacity: 0; width: 0; overflow: hidden;
            transition: all 0.8s ease-out;
        }
        .show-text #intro-text { opacity: 1; width: 480px; margin-left: 35px; }
        .move-to-corner { top: 30px !important; left: 30px !important; transform: translate(0, 0) !important; }
        .move-to-corner #logo-wrapper { width: 35px !important; height: 35px !important; }
        .move-to-corner #intro-text { opacity: 0 !important; width: 0 !important; margin-left: 0 !important; }

        /* --- MAIN UI --- */
        .wrapper { width: 700px; margin-top: 100px; opacity: 0; transition: opacity 1.5s ease; padding-bottom: 50px; }
        .show-ui { opacity: 1 !important; }
        .header-title { font-size: 16px; font-weight: bold; letter-spacing: 2px; color: #fff; margin-bottom: 25px; text-transform: uppercase; margin-left: 45px; }
        .section { margin-bottom: 20px; width: 100%; }
        .label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

        .box-style {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border); 
            border-radius: 2px; box-sizing: border-box; padding: 12px; 
            font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.5; 
            color: #ccc; outline: none; resize: none;
        }

        .btn-row { display: flex; gap: 8px; margin: 15px 0 25px 0; }
        button { 
            background: transparent; border: 1px solid var(--border); color: #fff; 
            padding: 8px 20px; font-size: 10px; cursor: pointer; text-transform: uppercase; 
            font-weight: bold; transition: 0.1s;
        }
        .btn-accent { border-color: var(--accent); color: var(--accent); }
        button:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        .ls-outer { border: 1px dashed #333; padding: 20px; border-radius: 4px; margin-top: 10px; }
        .ls-flex { display: flex; gap: 10px; }
        #ls-url { background: #080808; flex: 1; color: var(--accent); border: 1px solid var(--border); padding: 10px; font-size: 11px; outline: none; border-radius: 2px; }
        ::placeholder { color: #222; }
    </style>
</head>
<body>

    <div id="splash"></div>
    <div id="intro-container">
        <div id="logo-wrapper">
            <div class="logo-part top-half"></div>
            <div class="logo-part bottom-half"></div>
        </div>
        <div id="intro-text">Xec V2 Obfuscator</div>
    </div>

    <div class="wrapper" id="main-ui">
        <div class="header-title">XEC V2 | #1 LUAU OBFUSCATOR</div>

        <div class="section">
            <div class="label">Header</div>
            <textarea id="ascii" class="box-style" style="height: 50px; color: var(--accent);" placeholder="just put something here" spellcheck="false"></textarea>
        </div>

        <div class="section">
            <div class="label">Source</div>
            <textarea id="source" class="box-style" style="height: 180px;" placeholder='print("wow")' spellcheck="false"></textarea>
        </div>

        <div class="btn-row">
            <button class="btn-accent" onclick="build()">Obfuscate</button>
            <button onclick="copy()">Copy</button>
            <button onclick="clearAll()">Clear</button>
        </div>

        <div class="section">
            <div class="label">Output</div>
            <textarea id="output" class="box-style" style="height: 180px;" readonly placeholder="-- hi" spellcheck="false"></textarea>
        </div>

        <div class="section">
            <div class="ls-outer">
                <div class="label">Loadstring Maker</div>
                <div style="font-size: 9px; color: #444; margin-bottom: 8px;">Paste a Raw URL:</div>
                <div class="ls-flex">
                    <input type="text" id="ls-url" placeholder="hi again" spellcheck="false">
                    <button class="btn-accent" onclick="makeLS()">Generate</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const container = document.getElementById('intro-container');
            const splash = document.getElementById('splash');
            const ui = document.getElementById('main-ui');
            setTimeout(() => { container.classList.add('show-text'); }, 600);
            setTimeout(() => {
                container.classList.add('move-to-corner');
                splash.style.opacity = "0";
                ui.classList.add('show-ui');
                setTimeout(() => { splash.style.display = "none"; }, 1000);
            }, 2800);
        };

        function build() {
            const src = document.getElementById('source').value;
            if(!src) return;
            
            const k = [105, 72, 130];
            const bytes = new TextEncoder().encode(src);
            let hex = "";
            for (let i = 0; i < bytes.length; i++) { 
                hex += (bytes[i] ^ k[i % 3]).toString(16).padStart(2, '0'); 
            }
            
            let finalOutput = "";
            const isShort = src.length < 100;

            if (isShort) {
                // Generate Junk Bloat
                let junk = "";
                for(let i=0; i<15; i++) {
                    junk += `local _j${Math.random().toString(36).substr(2,5)} = "${Math.random().toString(36).repeat(2)}"\n`;
                }
                finalOutput = `--[[ Safe Bloat Mode ]]\n${junk}local _v="${hex}";local _k={105,72,130};local _b={};for i=1,#_v,2 do if 1+1==2 then table.insert(_b,string.char(bit32.bxor(tonumber(_v:sub(i,i+1),16),_k[(math.ceil(i/2)-1)%#_k+1]))) end end;loadstring(table.concat(_b))();\n--[[ End Bloat ]]`;
            } else {
                finalOutput = `--[[ Standard Obf ]]\nlocal _v="${hex}";local _k={105,72,130};local _b={};for i=1,#_v,2 do table.insert(_b,string.char(bit32.bxor(tonumber(_v:sub(i,i+1),16),_k[(math.ceil(i/2)-1)%#_k+1]))) end;loadstring(table.concat(_b))()`;
            }
            
            document.getElementById('output').value = finalOutput;
        }

        function makeLS() {
            const url = document.getElementById('ls-url').value;
            if(!url) return;
            document.getElementById('output').value = `loadstring(game:HttpGet("${url}", true))()`;
        }

        function copy() { document.getElementById('output').select(); document.execCommand('copy'); }
        function clearAll() {
            document.getElementById('source').value = "";
            document.getElementById('output').value = "";
            document.getElementById('ls-url').value = "";
        }
    </script>
</body>
</html>
